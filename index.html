<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI 涂鸦画室</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/screens.css">
</head>
<body>

  <section id="sceneSelect" class="scene-select active">
    <h1 class="screen-title">选一个场景</h1>
    <div class="scene-grid"></div>
  </section>

  <section id="canvasPage" class="canvas-page">
    <div class="canvas-header">
      <button class="btn-back">&larr; 返回</button>
      <span class="canvas-scene-name"></span>
    </div>
    <div class="canvas-wrapper"></div>
    <div class="canvas-toolbar">
      <div class="toolbar-colors">
        <button class="color-dot color-dot--red" data-color="#e53935"></button>
        <button class="color-dot color-dot--yellow" data-color="#fdd835"></button>
        <button class="color-dot color-dot--blue" data-color="#1e88e5"></button>
        <button class="color-dot color-dot--black active" data-color="#000000"></button>
      </div>
      <div class="toolbar-actions">
        <button class="btn-tool btn-undo">撤销</button>
        <button class="btn-tool btn-clear">清空</button>
        <button class="btn-tool btn-generate">生成</button>
      </div>
    </div>
  </section>

  <section id="loadingPage" class="loading-page">
    <div class="loading-content">
      <div class="loading-mascot">
        <img class="mascot-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='45' r='30' fill='%23ffb74d'/%3E%3Ccircle cx='48' cy='38' r='4' fill='%23333'/%3E%3Ccircle cx='72' cy='38' r='4' fill='%23333'/%3E%3Cpath d='M48 55 Q60 68 72 55' stroke='%23333' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3Crect x='30' y='75' width='60' height='40' rx='16' fill='%23e87b35'/%3E%3C/svg%3E" alt="涂鸦小伙伴">
      </div>
      <div class="loading-spinner"></div>
      <p class="loading-text">AI 正在画...</p>
    </div>
  </section>

  <section id="resultPage" class="result-page">
    <div class="result-image-wrap">
      <img class="result-image" src="" alt="AI 生成图">
    </div>
    <div class="result-actions">
      <button class="btn-result btn-save-qr">📱 保存二维码</button>
      <button class="btn-result btn-redraw">🖌️ 重画</button>
      <button class="btn-result btn-print">🖨️ 打印</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/fabric@5/dist/fabric.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
